# Install as /www/server/panel/vhost/nginx/extension/05_telephone/handbook.conf.
# The static directory sits outside Vite's dist output so app builds cannot remove it.
location ^~ /handbook/ {
    root /www/wwwroot/05-telephone;
    index index.html;
    try_files $uri $uri.html $uri/ =404;
    add_header X-Handbook-Static "quartz" always;
}
